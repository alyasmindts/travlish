<svg width="1000" height="1415" viewBox="0 0 1000 1415" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TRAVLISH Heritage English Experience program poster">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1000" y2="1415" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDFBF5"/>
      <stop offset="1" stop-color="#EEE5D5"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0C3864"/>
      <stop offset="1" stop-color="#061D3D"/>
