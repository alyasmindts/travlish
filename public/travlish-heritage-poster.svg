    <text x="84" y="958" fill="#17436E" font-family="Arial, sans-serif" font-size="19">✓ Create professional digital content</text>
    <text x="84" y="989" fill="#17436E" font-family="Arial, sans-serif" font-size="19">✓ Build a personal branding portfolio</text>
