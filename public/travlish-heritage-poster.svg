  <text x="55" y="355" fill="#0A315C" font-family="Arial Black, Arial, sans-serif" font-size="132" font-weight="900" letter-spacing="-8">HERITAGE</text>
  <text x="55" y="493" fill="url(#gold)" font-family="Arial Black, Arial, sans-serif" font-size="137" font-weight="900" letter-spacing="-8">ENGLISH</text>
  <text x="62" y="575" fill="#0A315C" font-family="cursive" font-size="91" font-style="italic">Experience</text>
