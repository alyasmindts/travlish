    <text x="476" y="958" fill="#17436E" font-family="Arial, sans-serif" font-size="18">2. Ampel Heritage Experience</text>
    <text x="476" y="989" fill="#17436E" font-family="Arial, sans-serif" font-size="18">3. Kampung Heritage Peneleh</text>
  </g>

