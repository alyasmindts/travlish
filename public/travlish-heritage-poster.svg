  <text x="58" y="1384" fill="#FFFDF9" font-family="Arial, sans-serif" font-size="19">Heritage English Experience by TRAVLISH Event Organizer</text>
  <text x="944" y="1384" fill="#F6D37E" font-family="Arial, sans-serif" font-size="19" text-anchor="end">SURABAYA, INDONESIA</text>
