    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E2B555"/>
      <stop offset="1" stop-color="#AB741B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#092D55" flood-opacity=".16"/>
    </filter>
    <pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#0C3864" fill-opacity=".12"/>
    </pattern>
  </defs>

  <rect width="1000" height="1415" fill="url(#paper)"/>
